# =============================================
# Brain Tumor Detection — Spring Boot Config
# =============================================

# Server port (used when running with embedded Tomcat for local dev)
# When deployed to external Tomcat, this is ignored — Tomcat's server.xml controls the port
server.port=8080

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/brain_tumor_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=your_password_here
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# File upload (MRI H5 files can be large)
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB

# Storage paths
app.upload.dir=C:/brain_tumor_detection/uploads/mri
app.predictions.dir=C:/brain_tumor_detection/output/predictions

# Python / AI model
app.python.executable=python
app.python.script=C:/brain_tumor_detection/inference.py
app.model.checkpoint=C:/brain_tumor_detection/output/checkpoints/brain_tumor_output_checkpoints_best_model.pth
app.model.data-dir=C:/Users/Loga Prasath/Downloads/archive/BraTS2020_training_data/content/data

# JWT
app.jwt.secret=BrainTumorDetectionSecretKey2026ChangeThisInProduction
app.jwt.expiration-ms=86400000
